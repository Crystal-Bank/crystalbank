  /accounts/{account_id}/blocks:
    get:
      summary: Get blocks
      description: 'Get blocks

        Get all active block causes on an account and the evaluated effective block
        state.

        The effective_block field is not stored — it is computed from the set of active
        causes.


        Required permission:

        - **read_accounts_blocks**'
      tags:
      - Accounts
      operationId: CrystalBank::Domains::Accounts::Api::Accounts_get_blocks
      parameters:
      - name: account_id
        in: path
        description: Account ID to retrieve blocks for
        required: true
        schema:
          type: string
          format: uuid
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Domains__Accounts__Api__Responses__BlocksResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Api__Responses__ErrorResponse'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Api__Responses__ErrorResponse'
        404:
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Api__Responses__ErrorResponse'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Api__Responses__ErrorResponse'
    post:
      summary: Request block
      description: 'Request block

        Request that a block cause be applied to an account. Blocks are stackable
        —

        multiple causes can coexist simultaneously and the effective block state is

        derived by evaluating all active causes:

        - Any FullBlock cause → FULL_BLOCK

        - Both Debit and Credit causes present → FULL_BLOCK (implied)

        - Only Debit causes → DEBIT_BLOCK

        - Only Credit causes → CREDIT_BLOCK


        Block type to effect mapping:

        - **compliance_block** → full_block

        - **generic_full_block** → full_block

        - **operations_block** → debit_block

        - **generic_debit_block** → debit_block

        - **generic_credit_block** → credit_block


        The request does not take effect immediately. An approval workflow is created

        that must be signed off by a user with **write_accounts_blocking_approval**.


        Required permission:

        - **write_accounts_blocking_request**'
      tags:
      - Accounts
      operationId: CrystalBank::Domains::Accounts::Api::Accounts_request_block
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrystalBank__Domains__Accounts__Api__Requests__BlockingRequest'
        required: true
      parameters:
      - name: account_id
        in: path
        description: Account ID to apply block to
        required: true
        schema:
          type: string
          format: uuid
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Domains__Accounts__Api__Responses__BlockRequestResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Api__Responses__ErrorResponse'
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Api__Responses__ErrorResponse'
        404:
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Api__Responses__ErrorResponse'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Api__Responses__ErrorResponse'
  /accounts/{account_id}/blocks/{block_type}:
    delete:
      summary: Request unblock
      description: 'Request unblock

        Request that an active block cause be removed from an account by its block
        type.

        Refers to the cause type (e.g. compliance_block), not a specific block ID.

        The effective block state is re-evaluated once the removal is approved.


        The request does not take effect immediately. An approval workflow is created

        that must be signed off by a user with **write_accounts_unblocking_approval**.


        Required permission:

        - **write_accounts_unblocking_request**'
      tags:
      - Accounts
      operationId: CrystalBank::Domains::Accounts::Api::Accounts_request_unblock
      parameters:
      - name: account_id
        in: path
        description: Account ID to remove block from
        required: true
        schema:
          type: string
          format: uuid
      - name: block_type
        in: path
        description: Block type to remove (e.g. compliance_block, operations_block)
        required: true
        schema:
          type: string
          enum:
          - compliance_block
          - operations_block
          - generic_debit_block
          - generic_credit_block
          - generic_full_block
      - name: reason
        in: query
        description: Optional reason for removing the block
        schema:
          type: string
          nullable: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalBank__Domains__Accounts__Api__Responses__BlockRequestResponse'
        401:
          description: Unauthorized
