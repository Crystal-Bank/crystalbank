components:
  schemas:
    CrystalBank__Api__JWKS__OpenIDConfiguration:
      type: object
      properties:
        issuer:
          type: string
        jwks_uri:
          type: string
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
      required:
      - issuer
      - jwks_uri
      - id_token_signing_alg_values_supported
    CrystalBank__Api__JWKS__JWKSResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty:
                type: string
              use:
                type: string
              alg:
                type: string
              crv:
                type: string
              x:
                type: string
              y:
                type: string
            required:
            - kty
            - use
            - alg
            - crv
            - x
            - y
      required:
      - keys
    CrystalBank__Domains__Accounts__Api__Requests__OpeningRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the account
        currencies:
          type: array
          description: List of supported currencies
          items:
            type: string
            enum:
            - chf
            - eur
            - gbp
            - jpy
            - usd
        customer_ids:
          type: array
          description: List of account owners (customers)
          items:
            type: string
            format: uuid
        type:
          type: string
          enum:
          - checking
          - overnight_money
          - savings
          - card
          - settlement
          - nostro
          - cpd
          - frozen_funds
          description: Type of the account
      required:
      - name
      - currencies
      - customer_ids
      - type
    CrystalBank__Domains__Accounts__Api__Responses__OpeningResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID of the requested account
      required:
      - id
      description: Response to an account opening request
    CrystalBank__Domains__Accounts__Api__Requests__BlockingRequest:
      type: object
      properties:
        block_type:
          type: string
          enum:
          - compliance_block
          - operations_block
          - generic_debit_block
          - generic_credit_block
          - generic_full_block
          description: Type of block to apply
        reason:
          type: string
          description: Optional reason for applying the block
          nullable: true
      required:
      - block_type
      description: HTTP body for the apply-block endpoint
    CrystalBank__Domains__Accounts__Api__Responses__BlockRequestResponse:
      type: object
      properties:
        block_request_id:
          type: string
          format: uuid
          description: ID of the block request aggregate
        approval_id:
          type: string
          format: uuid
          description: ID of the approval workflow that must be completed
        account_id:
          type: string
          format: uuid
          description: Account the block request targets
        block_type:
          type: string
          description: Block type that will be applied or removed once approved
        action:
          type: string
          description: Whether the block is being applied or removed
        reason:
          type: string
          description: Reason provided by the requestor
          nullable: true
        status:
          type: string
          description: Current status of the request
      required:
      - block_request_id
      - approval_id
      - account_id
      - block_type
      - action
      - status
      description: 'Returned immediately after a block or unblock is requested.

        The block does not take effect until the approval workflow completes.'
    CrystalBank__Domains__Accounts__Api__Responses__BlocksResponse:
      type: object
      properties:
        effective_block:
          type: string
          description: Evaluated effective block state derived from all active block
            causes
        blocks:
          type: array
          description: List of active block causes on the account
          items:
            type: object
            properties:
              block_type:
                type: string
                description: Block type cause
              applied_at:
                type: string
                format: date-time
                description: Timestamp when the block was applied
              applied_by:
                type: string
                format: uuid
                description: ID of the user who applied the block
              reason:
                type: string
                description: Reason for the block
                nullable: true
            required:
            - block_type
            - applied_at
